<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager (Beta)</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.app {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #43a047;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    padding: 12px;
    margin-bottom: 10px;
    background: #eee;
    border-radius: 8px;
}

.task-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.completed {
    text-decoration: line-through;
    color: gray;
}

.high { border-left: 5px solid red; }
.medium { border-left: 5px solid orange; }
.low { border-left: 5px solid green; }

.delete {
    background: red;
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
}

#errorMsg {
    color: red;
    font-size: 14px;
    margin-bottom: 10px;
}

@media (max-width: 480px) {
    body { padding: 10px; }
}
</style>

</head>

<body>

<div class="app">
    <h2>Task Manager (Beta)</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <p id="errorMsg"></p>

    <select id="priority">
        <option value="low">Low Priority</option>
        <option value="medium">Medium Priority</option>
        <option value="high">High Priority</option>
    </select>

    <button onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>

    <!-- 🔹 Feedback Section -->
    <h3>Feedback</h3>

    <form action="https://formspree.io/f/yourID" method="POST">
        <textarea 
            name="feedback" 
            placeholder="Enter your feedback here..." 
            required>
        </textarea>

        <input 
            type="email" 
            name="email" 
            placeholder="Your email (optional)">

        <button type="submit">Submit Feedback</button>
    </form>
</div>

<script>
let tasks = [];

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function loadTasks() {
    let stored = localStorage.getItem("tasks");
    if (stored) {
        tasks = JSON.parse(stored);
        tasks.forEach(t => renderTask(t.text, t.priority, t.completed));
    }
}

function addTask() {
    let input = document.getElementById("taskInput");
    let priority = document.getElementById("priority").value;
    let errorMsg = document.getElementById("errorMsg");

    let text = input.value.trim();
    errorMsg.innerText = "";

    if (text === "") {
        errorMsg.innerText = "Task cannot be empty!";
        return;
    }

    let task = { text, priority, completed: false };
    tasks.push(task);

    renderTask(text, priority, false);
    saveTasks();

    input.value = "";
}

function renderTask(text, priority, completed) {
    let li = document.createElement("li");
    li.classList.add(priority);

    li.innerHTML = `
        <div class="task-row">
            <span onclick="toggleComplete(this)">${text}</span>
            <span class="delete" onclick="deleteTask(this)">X</span>
        </div>
    `;

    if (completed) {
        li.querySelector("span").classList.add("completed");
    }

    document.getElementById("taskList").appendChild(li);
}

function toggleComplete(element) {
    element.classList.toggle("completed");
}

function deleteTask(element) {
    element.parentElement.parentElement.remove();
}

window.onload = loadTasks;
</script>

</body>
</html>
